name: MagicBusRoute
options:
  bundleIdPrefix: com.magicbusroute
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  MagicBusRoute:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: .
        excludes:
          - "**/.git/**"
          - "project.yml"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.magicbusroute.app
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "MagicBusRoute needs your location to track bus routes."
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
